<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Minecraft WebGame High FPS Edition</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #7ec0ee; font-family: 'Courier New', Courier, monospace; }
        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        canvas { width: 100% !important; height: 100% !important; display: block; image-rendering: pixelated; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .interactive { pointer-events: auto; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 16px; height: 16px; transform: translate(-50%, -50%); pointer-events: none; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(255, 255, 255, 0.8); mix-blend-mode: difference; }
        #crosshair::before { top: 7px; left: 0; width: 16px; height: 2px; }
        #crosshair::after { top: 0; left: 7px; width: 2px; height: 16px; }
        #top-bar { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; align-items: center; }
        .game-btn { background: #8b8b8b; border: 2px solid #fff; border-right-color: #555; border-bottom-color: #555; color: #fff; padding: 6px 12px; font-weight: bold; font-size: 12px; text-shadow: 1px 1px #000; cursor: pointer; box-shadow: inset -2px -2px #333, inset 2px 2px #ddd; }
        .game-btn:active { border: 2px solid #555; border-right-color: #fff; border-bottom-color: #fff; box-shadow: inset 2px 2px #333, inset -2px -2px #ddd; padding: 7px 11px 5px 13px; }
        #control-hint { background: rgba(0,0,0,0.6); color: #fff; padding: 6px 12px; border-radius: 4px; font-size: 11px; text-align: center; max-width: 250px; }
        #hotbar-container { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); display: flex; background: rgba(0, 0, 0, 0.4); padding: 2px; border: 4px solid #4a4a4a; border-radius: 2px; }
        .hotbar-slot { width: 44px; height: 44px; background: #8b8b8b; border: 3px solid #373737; margin: 0 2px; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; }
        .hotbar-slot.active { border: 3px solid #ffffff; box-shadow: 0 0 4px #fff; z-index: 5; }
        .block-icon { width: 32px; height: 32px; image-rendering: pixelated; }
        #inventory-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 340px; background: #c6c6c6; border: 4px solid #2c2c2c; box-shadow: inset -3px -3px #555, inset 3px 3px #fff; padding: 10px; display: none; flex-direction: column; z-index: 100; }
        #inventory-header { display: flex; justify-content: space-between; color: #404040; font-weight: bold; margin-bottom: 10px; font-size: 14px; }
        #inventory-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 4px; background: #8b8b8b; padding: 6px; border: 3px solid #373737; }
        .inv-slot { width: 32px; height: 32px; background: #8b8b8b; border: 2px solid #373737; box-shadow: inset -2px -2px #555, inset 2px 2px #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .inv-slot:hover { background: rgba(255,255,255,0.2); }
        #dpad { position: absolute; bottom: 20px; left: 20px; width: 120px; height: 120px; }
        .dpad-btn { position: absolute; width: 40px; height: 40px; background: rgba(255, 255, 255, 0.25); border: 2px solid rgba(255,255,255,0.4); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 18px; }
        #btn-up { top: 0; left: 40px; }
        #btn-left { top: 40px; left: 0; }
        #btn-center { top: 40px; left: 40px; background: rgba(255,255,255,0.1); border:none; }
        #btn-right { top: 40px; left: 80px; }
        #btn-down { bottom: 0; left: 40px; }
        #action-buttons { position: absolute; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 12px; }
        .action-btn { width: 54px; height: 54px; background: rgba(255, 255, 255, 0.25); border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; color: white; font-weight: bold; font-size: 13px; display: flex; align-items: center; justify-content: center; }
        .action-btn:active, .dpad-btn:active { background: rgba(255, 255, 255, 0.5); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div id="top-bar">
            <div id="control-hint">🔄 Drag Screen: Look Around<br>📱 Tap: Place | Hold: Break</div>
            <div style="display: flex; gap: 8px;">
                <button id="btn-inv" class="game-btn interactive">INVENTORY</button>
                <button id="btn-fs" class="game-btn interactive">FULLSCREEN</button>
            </div>
        </div>
        
        <div id="crosshair"></div>
        
        <div id="dpad" class="interactive">
            <div id="btn-up" class="dpad-btn">▲</div>
            <div id="btn-left" class="dpad-btn">◀</div>
            <div id="btn-center" class="dpad-btn"></div>
            <div id="btn-right" class="dpad-btn">▶</div>
            <div id="btn-down" class="dpad-btn">▼</div>
        </div>
        
        <div id="action-buttons" class="interactive">
            <div id="btn-jump" class="action-btn">JUMP</div>
        </div>
        
        <div id="hotbar-container" class="interactive">
            <div class="hotbar-slot active" data-index="0" data-block="grass"><div class="block-icon" style="background: linear-gradient(#5b8731 40%, #866043 40%); border: 1px solid #373737;"></div></div>
            <div class="hotbar-slot" data-index="1" data-block="dirt"><div class="block-icon" style="background: #866043; border: 1px solid #373737;"></div></div>
            <div class="hotbar-slot" data-index="2" data-block="stone"><div class="block-icon" style="background: #737373; border: 1px solid #373737;"></div></div>
            <div class="hotbar-slot" data-index="3" data-block="wood"><div class="block-icon" style="background: #b18f5d; border: 1px solid #373737;"></div></div>
            <div class="hotbar-slot" data-index="4" data-block="cobble"><div class="block-icon" style="background: #5a5a5a; border: 1px solid #373737;"></div></div>
            <div class="hotbar-slot" data-index="5" data-block="diamond"><div class="block-icon" style="background: #4dedf4; border: 1px solid #373737;"></div></div>
            <div class="hotbar-slot" data-index="6" data-block="gold"><div class="block-icon" style="background: #f4d04d; border: 1px solid #373737;"></div></div>
            <div class="hotbar-slot" data-index="7" data-block="glass"><div class="block-icon" style="background: rgba(255,255,255,0.4); border: 2px dashed #fff;"></div></div>
            <div class="hotbar-slot" data-index="8" data-block="tnt"><div class="block-icon" style="background: #cc3333; border: 1px solid #373737;"></div></div>
        </div>
        
        <div id="inventory-screen" class="interactive">
            <div id="inventory-header"><span>Inventory</span><span id="close-inv" style="cursor:pointer; color:#ff3333;">X</span></div>
            <div id="inventory-grid">
                <div class="inv-slot" data-block="grass" title="Grass"><div style="width:20px; height:20px; background: linear-gradient(#5b8731 40%, #866043 40%);"></div></div>
                <div class="inv-slot" data-block="dirt" title="Dirt"><div style="width:20px; height:20px; background:#866043;"></div></div>
                <div class="inv-slot" data-block="stone" title="Stone"><div style="width:20px; height:20px; background:#737373;"></div></div>
                <div class="inv-slot" data-block="wood" title="Oak Planks"><div style="width:20px; height:20px; background:#b18f5d;"></div></div>
                <div class="inv-slot" data-block="cobble" title="Cobblestone"><div style="width:20px; height:20px; background:#5a5a5a;"></div></div>
                <div class="inv-slot" data-block="diamond" title="Diamond Ore"><div style="width:20px; height:20px; background:#4dedf4;"></div></div>
                <div class="inv-slot" data-block="gold" title="Gold Ore"><div style="width:20px; height:20px; background:#f4d04d;"></div></div>
                <div class="inv-slot" data-block="glass" title="Glass"><div style="width:20px; height:20px; background:rgba(255,255,255,0.5); border:1px solid #fff;"></div></div>
                <div class="inv-slot" data-block="tnt" title="TNT"><div style="width:20px; height:20px; background:#cc3333;"></div></div>
                <div class="inv-slot" data-block="obsidian" title="Obsidian"><div style="width:20px; height:20px; background:#19132b;"></div></div>
                <div class="inv-slot" data-block="brick" title="Bricks"><div style="width:20px; height:20px; background:#b05546;"></div></div>
                <div class="inv-slot" data-block="emerald" title="Emerald Ore"><div style="width:20px; height:20px; background:#17dd62;"></div></div>
            </div>
        </div>
    </div>

    <script>
        // --- High-Quality Texture Engine ---
        function createPixelTexture(baseColor, noiseColor, type) {
            const canvas = document.createElement('canvas'); canvas.width = 16; canvas.height = 16;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = baseColor; ctx.fillRect(0, 0, 16, 16);
            
            for (let x = 0; x < 16; x++) {
                for (let y = 0; y < 16; y++) {
                    if (Math.random() > 0.7) { ctx.fillStyle = noiseColor; ctx.fillRect(x, y, 1, 1); }
                }
            }
            if (type === 'grass_top') {
                ctx.fillStyle = '#5b8731'; ctx.fillRect(0, 0, 16, 16);
                for (let x = 0; x < 16; x++) { for (let y = 0; y < 16; y++) { if (Math.random() > 0.6) { ctx.fillStyle = '#496e26'; ctx.fillRect(x, y, 1, 1); } } }
            } else if (type === 'grass_side') {
                ctx.fillStyle = '#5b8731'; ctx.fillRect(0, 0, 16, 4);
                for(let i=0; i<16; i++) { 
                    let h = Math.floor(Math.random() * 3) + 3;
                    ctx.fillStyle = '#5b8731'; ctx.fillRect(i, 0, 1, h); 
                    if(Math.random() > 0.5) { ctx.fillStyle = '#496e26'; ctx.fillRect(i, h-1, 1, 1); }
                }
            } else if (type === 'diamond' || type === 'gold' || type === 'emerald') {
                let col = type === 'diamond' ? '#4dedf4' : (type === 'gold' ? '#f4d04d' : '#17dd62');
                ctx.fillStyle = col; ctx.fillRect(2, 3, 2, 2); ctx.fillRect(9, 2, 3, 2); ctx.fillRect(4, 11, 2, 2);
            } else if (type === 'tnt') {
                ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 5, 16, 5);
                ctx.fillStyle = '#000000'; ctx.font = 'bold 5px monospace'; ctx.fillText('TNT', 3, 9);
            } else if (type === 'glass') {
                ctx.fillStyle = 'rgba(255,255,255,0.05)'; ctx.fillRect(0,0,16,16);
                ctx.fillStyle = '#ffffff'; ctx.fillRect(1,1,14,1); ctx.fillRect(1,1,1,14); ctx.fillRect(14,1,1,14); ctx.fillRect(1,14,14,1);
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.magFilter = THREE.NearestFilter; texture.minFilter = THREE.NearestFilter;
            return texture;
        }

        const tex = {
            grassTop: createPixelTexture('#5b8731', '#496e26', 'grassTop'),
            grassSide: createPixelTexture('#866043', '#573d2a', 'grass_side'),
            dirt: createPixelTexture('#866043', '#573d2a', 'dirt'),
            stone: createPixelTexture('#737373', '#525252', 'stone'),
            wood: createPixelTexture('#b18f5d', '#7d643f', 'wood'),
            cobble: createPixelTexture('#636363', '#3d3d3d', 'cobble'),
            diamond: createPixelTexture('#737373', '#525252', 'diamond'),
            gold: createPixelTexture('#737373', '#525252', 'gold'),
            glass: createPixelTexture('rgba(255,255,255,0)', '#ffffff', 'glass'),
            tnt: createPixelTexture('#cc3333', '#8f1d1d', 'tnt'),
            obsidian: createPixelTexture('#140f24', '#08060f', 'obsidian'),
            brick: createPixelTexture('#9c4538', '#632b22', 'brick'),
            emerald: createPixelTexture('#737373', '#525252', 'emerald')
        };

        function getBlockMaterials(type) {
            if (type === 'grass') {
                const sideMat = new THREE.MeshLambertMaterial({ map: tex.grassSide });
                const topMat = new THREE.MeshLambertMaterial({ map: tex.grassTop });
                const bottomMat = new THREE.MeshLambertMaterial({ map: tex.dirt });
                return [sideMat, sideMat, topMat, bottomMat, sideMat, sideMat];
            }
            let matOptions = { map: tex[type] || tex.dirt };
            if (type === 'glass') { matOptions.transparent = true; matOptions.opacity = 0.6; }
            const standardMat = new THREE.MeshLambertMaterial(matOptions);
            return [standardMat, standardMat, standardMat, standardMat, standardMat, standardMat];
        }

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene(); scene.background = new THREE.Color(0x7ec0ee); scene.fog = new THREE.FogExp2(0x7ec0ee, 0.015);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight); renderer.setPixelRatio(1); // Set 1 for ultra-fast render
        container.appendChild(renderer.domElement);
        
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.85); scene.add(ambientLight);
        
        const blockGeo = new THREE.BoxGeometry(1, 1, 1);
        const wireGeo = new THREE.EdgesGeometry(blockGeo); const wireMat = new THREE.LineBasicMaterial({ color: 0x000000 }); const hoverOutline = new THREE.LineSegments(wireGeo, wireMat); hoverOutline.visible = false; scene.add(hoverOutline);
        
        // Dynamic Map Object Tracking for Fast Raycasting & Infinite Custom Edits
        const blockMap = new Map(); const blocksArray = [];
        
        function addBlockToWorld(type, pos) {
            const materials = getBlockMaterials(type);
            const mesh = new THREE.Mesh(blockGeo, materials);
            mesh.position.copy(pos);
            mesh.userData = { type: type };
            scene.add(mesh);
            blocksArray.push(mesh);
            blockMap.set(`${pos.x},${pos.y},${pos.z}`, mesh);
        }

        // --- Ultra High FPS Map Generator ---
        const worldSize = 32;
        for (let x = -worldSize/2; x < worldSize/2; x++) {
            for (let z = -worldSize/2; z < worldSize/2; z++) {
                let height = Math.floor(Math.sin(x * 0.15) * Math.cos(z * 0.15) * 3) + 2;
                height = Math.max(0, height); 

                addBlockToWorld('grass', new THREE.Vector3(x, height, z));
                addBlockToWorld('dirt', new THREE.Vector3(x, height - 1, z));
                
                // Keep only top layers active to completely boost FPS
                for(let y = height - 2; y >= height - 3; y--) {
                    let randStone = Math.random();
                    let currentLayer = 'stone';
                    if(randStone > 0.98) currentLayer = 'diamond';
                    else if(randStone > 0.96) currentLayer = 'gold';
                    createBlockMesh = addBlockToWorld(currentLayer, new THREE.Vector3(x, y, z));
                }
            }
        }
        
        let playerPos = new THREE.Vector3(0, 6, 0); let cameraPitch = -0.2; let cameraYaw = 0;
        function updateCameraTransform() {
            camera.position.copy(playerPos);
            const target = new THREE.Vector3(playerPos.x + Math.sin(cameraYaw) * Math.cos(cameraPitch), playerPos.y + Math.sin(cameraPitch), playerPos.z + Math.cos(cameraYaw) * Math.cos(cameraPitch));
            camera.lookAt(target);
        }
        updateCameraTransform();
        
        let currentBlock = 'grass';
        let isDraggingCamera = false; let previousPointerX = 0; let previousPointerY = 0;
        let pointerStartTime = 0; let pointerTimer = null; let hasMovedMuch = false;
        let isInventoryOpen = false;

        // --- Optimized Pointer Controller System ---
        window.addEventListener('pointerdown', (e) => {
            if (e.target.closest('.interactive')) return;
            isDraggingCamera = true; hasMovedMuch = false;
            pointerStartTime = Date.now(); previousPointerX = e.clientX; previousPointerY = e.clientY;

            if (pointerTimer) clearTimeout(pointerTimer);
            pointerTimer = setTimeout(() => { if (!hasMovedMuch) handleWorldInteraction('break'); }, 500);
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDraggingCamera) return;
            const deltaX = e.clientX - previousPointerX; const deltaY = e.clientY - previousPointerY;
            if (Math.abs(deltaX) > 4 || Math.abs(deltaY) > 4) { hasMovedMuch = true; if (pointerTimer) clearTimeout(pointerTimer); }
            cameraYaw -= deltaX * 0.005; cameraPitch = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, cameraPitch - deltaY * 0.005));
            previousPointerX = e.clientX; previousPointerY = e.clientY;
        });

        window.addEventListener('pointerup', (e) => {
            if (pointerTimer) clearTimeout(pointerTimer);
            if (e.target.closest('.interactive')) return;
            if (isDraggingCamera && !hasMovedMuch && (Date.now() - pointerStartTime < 350)) handleWorldInteraction('place');
            isDraggingCamera = false;
        });

        window.addEventListener('touchstart', (e) => { if (!e.target.closest('.interactive')) e.preventDefault(); }, { passive: false });

        const raycaster = new THREE.Raycaster(); const centerPoint = new THREE.Vector2(0, 0);
        function checkRaycast() {
            raycaster.setFromCamera(centerPoint, camera); const intersects = raycaster.intersectObjects(blocksArray);
            if (intersects.length > 0 && intersects[0].distance < 8) { const intersect = intersects[0]; hoverOutline.position.copy(intersect.object.position); hoverOutline.visible = true; return intersect; }
            else { hoverOutline.visible = false; return null; }
        }
        
        function handleWorldInteraction(mode) {
            const intersect = checkRaycast(); if (!intersect) return;
            if (mode === 'break') {
                const obj = intersect.object; scene.remove(obj); const idx = blocksArray.indexOf(obj); if (idx > -1) blocksArray.splice(idx, 1);
                blockMap.delete(`${obj.position.x},${obj.position.y},${obj.position.z}`);
            } else if (mode === 'place') {
                const normal = intersect.face.normal; const newPos = intersect.object.position.clone().add(normal);
                if (!(Math.abs(newPos.x - playerPos.x) < 0.6 && Math.abs(newPos.z - playerPos.z) < 0.6 && Math.abs(newPos.y - playerPos.y) < 1.0)) {
                    addBlockToWorld(currentBlock, newPos);
                }
            }
        }

        // --- Movement & Optimized Render Loop ---
        const activeKeys = {}; window.addEventListener('keydown', (e) => { activeKeys[e.key.toLowerCase()] = true; if (e.key.toLowerCase() === 'e') toggleInventory(); }); window.addEventListener('keyup', (e) => { activeKeys[e.key.toLowerCase()] = false; });
        const mobileMove = { up: false, down: false, left: false, right: false };
        setupMobileDpad('btn-up', 'up'); setupMobileDpad('btn-down', 'down'); setupMobileDpad('btn-left', 'left'); setupMobileDpad('btn-right', 'right');
        function setupMobileDpad(id, direction) { const el = document.getElementById(id); el.addEventListener('pointerdown', (e) => { e.preventDefault(); e.stopPropagation(); mobileMove[direction] = true; }); el.addEventListener('pointerup', (e) => { e.preventDefault(); e.stopPropagation(); mobileMove[direction] = false; }); el.addEventListener('pointerleave', () => { mobileMove[direction] = false; }); }
        
        let yVelocity = 0; let isGrounded = true; document.getElementById('btn-jump').addEventListener('pointerdown', (e) => { e.preventDefault(); e.stopPropagation(); triggerJump(); }); window.addEventListener('keydown', (e) => { if (e.key === ' ') triggerJump(); });
        function triggerJump() { if (isGrounded) { yVelocity = 0.15; isGrounded = false; } }
        
        function animate() {
            requestAnimationFrame(animate); let moveX = 0; let moveZ = 0;
            if (activeKeys['w'] || activeKeys['arrowup'] || mobileMove.up) { moveX += Math.sin(cameraYaw); moveZ += Math.cos(cameraYaw); }
            if (activeKeys['s'] || activeKeys['arrowdown'] || mobileMove.down) { moveX -= Math.sin(cameraYaw); moveZ -= Math.cos(cameraYaw); }
            if (activeKeys['a'] || mobileMove.left) { moveX += Math.sin(cameraYaw + Math.PI/2); moveZ += Math.cos(cameraYaw + Math.PI/2); }
            if (activeKeys['d'] || mobileMove.right) { moveX -= Math.sin(cameraYaw + Math.PI/2); moveZ -= Math.cos(cameraYaw + Math.PI/2); }
            
            const speed = 0.08; playerPos.x += moveX * speed; playerPos.z += moveZ * speed;
            yVelocity -= 0.008; playerPos.y += yVelocity;
            
            let currentGroundY = 1.5; const ix = Math.floor(playerPos.x + 0.5); const iy = Math.floor(playerPos.y - 1.5); const iz = Math.floor(playerPos.z + 0.5);
            if (blockMap.has(`${ix},${iy},${iz}`) || blockMap.has(`${ix},${iy+1},${iz}`)) { 
                currentGroundY = Math.max(blockMap.has(`${ix},${iy},${iz}`)?iy: -99, blockMap.has(`${ix},${iy+1},${iz}`)?iy+1: -99) + 1.5; 
            }
            if (playerPos.y <= currentGroundY) { playerPos.y = currentGroundY; yVelocity = 0; isGrounded = true; }
            if (playerPos.y < -10) { playerPos.set(0, 8, 0); yVelocity = 0; }
            
            updateCameraTransform(); checkRaycast(); renderer.render(scene, camera);
        }
        animate();

        // --- GUI Handlers ---
        const slots = document.querySelectorAll('.hotbar-slot');
        slots.forEach(slot => { slot.addEventListener('click', (e) => { e.stopPropagation(); slots.forEach(s => s.classList.remove('active')); slot.classList.add('active'); currentBlock = slot.getAttribute('data-block'); }); });
        
        const invScreen = document.getElementById('inventory-screen');
        function toggleInventory() { isInventoryOpen = !isInventoryOpen; invScreen.style.display = isInventoryOpen ? 'flex' : 'none'; }
        document.getElementById('btn-inv').addEventListener('click', (e) => { e.stopPropagation(); toggleInventory(); }); document.getElementById('close-inv').addEventListener('click', (e) => { e.stopPropagation(); toggleInventory(); });
        
        const invSlots = document.querySelectorAll('.inv-slot');
        invSlots.forEach(slot => {
            slot.addEventListener('click', (e) => {
                e.stopPropagation(); const newBlockType = slot.getAttribute('data-block'); const activeHotbarSlot = document.querySelector('.hotbar-slot.active');
                if (activeHotbarSlot) {
                    activeHotbarSlot.setAttribute('data-block', newBlockType);
                    activeHotbarSlot.querySelector('.block-icon').style.background = slot.querySelector('div').style.background;
                    activeHotbarSlot.querySelector('.block-icon').style.border = slot.querySelector('div').style.border || 'none';
                    currentBlock = newBlockType; toggleInventory();
                }
            });
        });
        document.getElementById('btn-fs').addEventListener('click', (e) => { e.stopPropagation(); if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); });
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
</body>
</html>
